
name: renew
env:
    TZ: Asia/Shanghai

on:
  schedule:
    - cron: '0 20 * * sun'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: prepare
        run: |
            if [ -n "${{ secrets.DOMAIN_LIST }}" ] && [ -n "${{ secrets.KEY_SH }}" ] && [ -n "${{ secrets.WEBDAV_URL }}" ]; then
                echo renew='true' >> $GITHUB_ENV
            fi
            if [ -n "${{ secrets.WEBDAV_URL }}" ]; then
                echo webdav='true' >> $GITHUB_ENV
            fi

      - name: download old config
        if: ${{ env.webdav == 'true' }}
        run: |
            WEBDAV_URL="${{ secrets.WEBDAV_URL }}"
            code=$(curl -s -w '%{http_code}' -o acme-data.tar.gz "$WEBDAV_URL/acme-data.tar.gz")
            if [ "$code" = "200" ]; then
                tar -zxf acme-data.tar.gz
                rm -f acme-data.tar.gz
                echo "Downloaded existing config"
            elif [ "$code" = "404" ]; then
                rm -f acme-data.tar.gz
                echo "No existing config, will create new"
            else
                echo "Download failed with HTTP $code"
                exit 1
            fi

      - name: init
        if: ${{ env.renew == 'true' }}
        run: |
            export DOMAIN_LIST="${{ secrets.DOMAIN_LIST }}"
            export KEY_SH="${{ secrets.KEY_SH }}"
            ./init.sh

      - name: renew
        id: renew
        if: ${{ env.renew == 'true' }}
        continue-on-error: true
        run: ./renew.sh

      - name: clean log on success
        if: ${{ steps.renew.outcome == 'success' }}
        run: rm -f acme-data/acme.sh.log

      - name: upload new config
        if: ${{ env.webdav == 'true' }}
        run: |
            if [ ! -d acme-data ]; then
                echo "No acme-data directory, skipping upload"
                exit 0
            fi
            WEBDAV_URL="${{ secrets.WEBDAV_URL }}"
            tar -zcf acme-data.tar.gz acme-data
            code=$(curl -s -o /dev/null -w '%{http_code}' -T acme-data.tar.gz "$WEBDAV_URL/")
            if [ "$code" = "201" ] || [ "$code" = "204" ]; then
                echo "Upload success (HTTP $code)"
            else
                echo "Upload failed with HTTP $code"
                exit 2
            fi

      - name: check renew result
        if: ${{ steps.renew.outcome == 'failure' }}
        run: |
            echo "Certificate renewal failed, but logs have been uploaded"
            exit 1

